# ~/.dotfiles/.config/fuzzel/fuzzel.ini
# Fuzzel Configuration - Maximum Speed & True Horizontal dmenu Layout

[main]
# --- Absolute Layout & Anchoring Constraints ---
# Spawns an edge-to-edge bar at the top of your display path
anchor=top
width=1920 # Set this to match your monitor's exact width (e.g., 1920, 2560, 3840)
lines=1
tabs=0

# --- Precise dmenu Row Spacing ---
horizontal-pad=10
vertical-pad=4
inner-pad=12

# --- Prompt & Interface Minimalization ---
prompt="> "
placeholder=""
show-actions=no

# --- Paranoid Input & Search Optimization ---
fields=filename
fuzzy=no
filter-exact=no
sort-result=no

# --- Zero-Overhead Rendering ---
font=monospace:pixelsize=12
dpi-aware=no
use-bold=no
icons-enabled=no
image-size-ratio=0
layer=overlay
exit-on-keyboard-focus-loss=yes
render-delay=0

[colors]
background=222222ff
text=bbbbbbff
match=bbbbbbff
selection=005577ff
selection-text=ffffffff
selection-match=ffffffff
border=005577ff

[border]
width=0
radius=0
selection-radius=0

[dmenu]
# --- The Horizontal Ribbon Fix ---
# mode=index returns the numerical index, but we want the true text menu layout.
# Removing 'mode=index' allows Fuzzel to read standard dmenu flags cleanly.
exit-immediately-if-empty=yes

# This forces the matches to flow horizontally from left to right on the exact same line!
# Note: Fuzzel automatically manages the item count based on your width.
horizontal=yes

[key-bindings]
execute-or-next=none
next=Tab Right Control+n
prev=Shift+Tab Left Control+p
