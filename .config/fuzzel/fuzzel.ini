# Fuzzel Configuration - Maximum Speed & True dmenu Layout

[main]
# --- Absolute Layout & Anchoring Constraints ---
# Force standard dmenu top-bar placement across the screen
anchor=top
lines=1
width=100
tabs=0
horizontal-pad=0
vertical-pad=0
inner-pad=0

# --- Prompt & Interface Minimalization ---
prompt="> "
placeholder=""
show-actions=no

# --- Paranoid Input & Search Optimization ---
# Search ONLY the executable filename (bypasses name, generic name, descriptions, etc.)
fields=filename

# Disable all heavy search logic features for raw, zero-overhead matching
fuzzy=no
filter-exact=no
sort-result=no

# --- Zero-Overhead Rendering ---
# Specifying pixelsize directly stops the compositor from executing DPI recalculation loops
font=monospace:pixelsize=12
dpi-aware=no
use-bold=no

# Completely eliminate image processing, lookups, and scaling
icons-enabled=no
image-size-ratio=0

# Compositor hints for instant surface drawing
layer=overlay
exit-on-keyboard-focus-loss=yes
render-delay=0
filter-display-column=0

[colors]
# Classic dmenu color palette with zero-alpha transparent borders
background=222222ff
text=bbbbbbff
match=bbbbbbff
selection=005577ff
selection-text=ffffffff
selection-match=ffffffff
border=00000000

[border]
# Drop all anti-aliasing composition math
width=0
radius=0
selection-radius=0

[dmenu]
mode=index
exit-immediately-if-empty=yes

[key-bindings]
# Strict manual execution only: Prevents auto-accepting single matches on Tab
execute-or-next=none
next=Tab Down Control+n
