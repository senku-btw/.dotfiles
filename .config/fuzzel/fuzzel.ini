# Paranoid-tier speed optimization
[main]
font=monospace:size=10
dpi-aware=no

# Severe input/search optimization: search ONLY the executable filename
fields=filename
icons-enabled=no

# Hardcoded geometry constraints to minimize compositor overhead
anchor=top-left
lines=5
width=40
tabs=0
horizontal-pad=0
vertical-pad=0
inner-pad=0
image-size-ratio=0

prompt="> "
placeholder=""

# Disable all search logic features except raw prefix/substring matching
fuzzy=no
filter-exact=no
sort-result=no

# Execution optimizations
terminal=sh -c
show-actions=no

[colors]
background=222222ff
text=bbbbbbff
match=bbbbbbff
selection=005577ff
selection-text=ffffffff
selection-match=ffffffff
border=00000000

[border]
width=0
radius=0

[dmenu]
mode=index
exit-immediately-if-empty=yes
