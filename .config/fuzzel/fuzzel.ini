# ~/.dotfiles/.config/fuzzel/fuzzel.ini
# Fuzzel Configuration - Maximum Speed & True Horizontal dmenu Layout

[main]
# --- Absolute Layout & Anchoring Constraints ---
# Force standard dmenu top-bar placement across the entire monitor width
anchor=top
width=1920 # Change this to match your monitor's exact horizontal resolution if needed
lines=1
tabs=0

# --- The Crucial dmenu Trick ---
# Setting padding forcing items to sit side-by-side in a single row
horizontal-pad=10
vertical-pad=4
inner-pad=12

# --- Prompt & Interface Minimalization ---
prompt="> "
placeholder=""
show-actions=no

# --- Paranoid Input & Search Optimization ---
# Search ONLY the executable filename (bypasses heavy desktop-file lookups)
fields=filename
fuzzy=no
filter-exact=no
sort-result=no

# --- Zero-Overhead Rendering ---
# Specifying pixelsize directly stops the compositor from executing DPI scaling loops
font=monospace:pixelsize=12
dpi-aware=no
use-bold=no

# Completely eliminate image processing, icon lookups, and scaling math
icons-enabled=no
image-size-ratio=0

# Compositor hints for instant surface drawing
layer=overlay
exit-on-keyboard-focus-loss=yes
render-delay=0

[colors]
# Classic dmenu color palette (Nordic Charcoal / Selection Blue)
background=222222ff
text=bbbbbbff
match=bbbbbbff
selection=005577ff
selection-text=ffffffff
selection-match=ffffffff
border=005577ff

[border]
# Flatten borders to prevent anti-aliasing composition math
width=0
radius=0
selection-radius=0

[dmenu]
# Force horizontal selection layout across the screen width
mode=index
exit-immediately-if-empty=yes

[key-bindings]
# Strict manual execution only: Prevents auto-accepting single matches on Tab
execute-or-next=none
next=Tab Down Control+n
prev=Shift+Tab Up Control+p
